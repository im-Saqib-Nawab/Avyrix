# Deploy the Express backend on Render (recommended alongside Vercel frontend).
# Docs: https://render.com/docs/infrastructure-as-code
#
# After deploy, set Vercel env vars (also in frontend/vercel.json):
#   NEXT_PUBLIC_API_URL=https://avyrix-backend.onrender.com
#   NEXT_PUBLIC_WS_URL=wss://avyrix-backend.onrender.com
#   FRONTEND_URL on backend = https://avyrix.vercel.app

services:
  - type: web
    name: avyrix-api
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: KLING_ACCESS_KEY
        sync: false
      - key: KLING_SECRET_KEY
        sync: false
      - key: HEYGEN_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ADMIN_SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@avyrix.ai
      - key: ADMIN_PASSWORD
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
